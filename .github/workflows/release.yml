name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
        exclude:
          - goos: windows
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Set version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build \
            -ldflags="-s -w -X main.Version=${{ steps.version.outputs.version }}" \
            -o jobrunner-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/jobrunner

      - name: Create archive
        run: |
          mkdir -p release
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -j release/jobrunner-${{ matrix.goos }}-${{ matrix.goarch }}.zip jobrunner-${{ matrix.goos }}-${{ matrix.goarch }}.exe
          else
            chmod +x jobrunner-${{ matrix.goos }}-${{ matrix.goarch }}
            tar -czf release/jobrunner-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz jobrunner-${{ matrix.goos }}-${{ matrix.goarch }}
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jobrunner-${{ matrix.goos }}-${{ matrix.goarch }}
          path: release/
          retention-days: 1

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release

      - name: Set version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          git log $(git describe --tags --abbrev=0 HEAD^)..HEAD --pretty=format:"- %s" > changelog.txt
          echo "changelog=$(cat changelog.txt | tr '\n' ' ')" >> $GITHUB_OUTPUT

      - name: Flatten release files
        run: |
          mkdir -p dist
          find ./release -type f -exec mv {} dist/ \;

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.version }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.changelog }}

            ## Installation
            Download the archive for your platform and extract it.

            ### Linux
            ```bash
            tar -xzf jobrunner-linux-amd64.tar.gz
            sudo mv jobrunner-linux-amd64 /usr/local/bin/jobrunner
            ```

            ### macOS
            ```bash
            tar -xzf jobrunner-darwin-amd64.tar.gz
            sudo mv jobrunner-darwin-amd64 /usr/local/bin/jobrunner
            ```

            ### Windows
            Extract the zip file and add to your PATH.
          draft: false
          prerelease: false
          files: |
            dist/*
